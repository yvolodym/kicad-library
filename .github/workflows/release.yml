name: Release Addon

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (z.B. 1.0.4). Aktuelle Version siehst du in metadata.json (top of versions[]).'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve versions
        id: ver
        shell: bash
        run: |
          CURRENT=$(python3 -c "
          import json
          try:
              m = json.load(open('metadata.json'))
              vs = m.get('versions') or []
              print(vs[0]['version'] if vs else '0.0.0')
          except FileNotFoundError:
              print('0.0.0')
          ")
          NEXT="${{ inputs.version }}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"       >> "$GITHUB_OUTPUT"
          {
            echo "## Release"
            echo ""
            echo "| Current | New |"
            echo "|---|---|"
            echo "| \`$CURRENT\` | **\`$NEXT\`** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build PCM zip
        run: python3 package.py "${{ steps.ver.outputs.next }}"

      - name: Commit updated metadata.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metadata.json
          git commit -m "Release v${{ steps.ver.outputs.next }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create GitHub release with zip asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.next }}" \
            --title  "v${{ steps.ver.outputs.next }}" \
            --target "${{ github.ref_name }}" \
            --generate-notes \
            build/yvolodym-kicad-addon.zip

      - name: Reminder for GitLab metadata MR
        run: |
          {
            echo ""
            echo "### Next manual step"
            echo "Submit \`metadata.json\` + \`resources/icon.png\` to"
            echo "\`gitlab.com/kicad/addons/metadata\` under"
            echo "\`packages/com.github.yvolodym.kicad-libraries/\` via merge request"
            echo "(see \`release-kicad-addons.md\`)."
          } >> "$GITHUB_STEP_SUMMARY"
